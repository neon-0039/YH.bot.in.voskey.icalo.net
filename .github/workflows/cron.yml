name: Misskey Bot Python Cron
concurrency:
  group: bot-group
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [a_bot]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (for MeCab)
        run: |
          sudo apt-get update
          sudo apt-get install -y mecab libmecab-dev mecab-ipadic-utf8

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
          MK_DOMAIN: ${{ secrets.MK_DOMAIN }}
          MK_TOKEN: ${{ secrets.MK_TOKEN }}
          MK_TOKEN_ID: ${{ secrets.MK_TOKEN_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_SUB: ${{ secrets.GEMINI_API_KEY_SUB }}
        run: |
          # 1. Secretが空でないか改めて確認
          if [ -z "$GDRIVE_SERVICE_ACCOUNT" ]; then 
            echo "Error: GDRIVE_SERVICE_ACCOUNT is still empty!"
            exit 1
          fi
          
          # 2. 実行
          python bot.py
